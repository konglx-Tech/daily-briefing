name: 每日开盘简报

on:
  schedule:
    # 北京时间周一至周五 08:45 (UTC 00:45)
    - cron: '45 0 * * 1-5'
  workflow_dispatch:

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Morning Briefing
        env:
          SEND_KEY: ${{ secrets.SEND_KEY }}
        run: python stock_briefing.py --mode morning
